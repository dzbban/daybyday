<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strona nie znaleziona | DaybyDay</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">


  <link rel="stylesheet" href="fonts.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#F8F7F5; --surface:#FFFFFF; --border:#E8E5E0; --text:#1A1916; --muted:#6B6762; --tag-bg:#F0EDEA; --radius:16px; }
    html, body { max-width: 100vw; overflow-x: clip; }
    body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; min-height:100vh; display:flex; flex-direction:column; }
    .topnav { position:sticky; top:0; z-index:50; background:rgba(248,247,245,0.9); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); padding:0 2rem; height:56px; display:flex; align-items:center; justify-content:space-between; }
    .nav-logo { font-family:'Instrument Serif',serif; font-size:1.25rem; color:var(--text); text-decoration:none; }
    .nav-links { display:flex; gap:.25rem; list-style:none; }
    .nav-links a { font-size:.8rem; font-weight:500; color:var(--muted); text-decoration:none; padding:.35rem .75rem; border-radius:8px; transition:background .15s,color .15s; }
    .nav-links a:hover { background:var(--tag-bg); color:var(--text); }
    main { flex:1; display:flex; align-items:center; justify-content:center; padding:2rem; text-align:center; }
    .err-num { font-family:'Instrument Serif',serif; font-size:clamp(6rem,20vw,12rem); line-height:1; color:var(--border); }
    .err-title { font-family:'Instrument Serif',serif; font-size:clamp(1.5rem,4vw,2.5rem); margin-bottom:.75rem; }
    .err-sub { font-size:.9rem; color:var(--muted); line-height:1.65; max-width:420px; margin:0 auto 2rem; }
    .err-links { display:flex; gap:.75rem; justify-content:center; flex-wrap:wrap; }
    .btn { padding:.6rem 1.5rem; border-radius:60px; font-size:.85rem; font-weight:500; text-decoration:none; font-family:inherit; transition:all .15s; }
    .btn-primary { background:var(--text); color:white; }
    .btn-primary:hover { opacity:.85; }
    .btn-secondary { background:var(--surface); color:var(--text); border:1px solid var(--border); }
    .btn-secondary:hover { background:var(--tag-bg); }
    footer { border-top:1px solid var(--border); padding:1.5rem 2rem; display:flex; align-items:center; justify-content:center; }
    .footer-logo { font-family:'Instrument Serif',serif; font-size:.9rem; color:var(--muted); }
    @media(max-width:600px){ .page{padding-left:12px;padding-right:12px} .nav-month{display:none} .nav-links{display:none} .topnav{padding:0 12px} }

    body{animation:pageIn .28s ease both}
    @keyframes pageIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    body.page-out{animation:pageOut .22s ease forwards}
    @keyframes pageOut{to{opacity:0;transform:translateY(-5px)}}  </style>
  <style>
    .nav-burger { display:none; flex-direction:column; justify-content:center; gap:5px; width:36px; height:36px; background:none; border:none; cursor:pointer; padding:6px; border-radius:8px; transition:background .15s; }
    .nav-burger:hover { background:var(--tag-bg); }
    .nav-burger span { display:block; height:2px; background:var(--text); border-radius:2px; transition:all .25s; }
    .nav-burger.open span:nth-child(1) { transform:translateY(7px) rotate(45deg); }
    .nav-burger.open span:nth-child(2) { opacity:0; }
    .nav-burger.open span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }
    @media(max-width:600px){
      .nav-burger { display:flex; }
      .topnav .nav-links { display:none; position:fixed; top:56px; left:0; right:0; background:rgba(248,247,245,0.98); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); flex-direction:column; padding:.5rem; gap:.25rem; z-index:49; }
      .topnav .nav-links.open { display:flex; }
    }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#F8F7F5" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#111110" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DaybyDay">
  <style id="dark-mode-styles">
    [data-theme="dark"] {
      --bg: #111110; --surface: #1B1A18; --border: #2C2A27;
      --text: #F0EDE8; --muted: #6A6760; --tag-bg: #232220;
      --fertile: #0D1F10; --fertile-text: #7BC87F;
      --ovulation: #0D1526; --ovulation-text: #7BA0D4;
      --period: #1F0D0A; --period-text: #D47A5A;
      --open: #0D1F10; --open-text: #7BC87F;
      --closed: #1F0D0A; --closed-text: #D47A5A; --accent: #D8D4CE;
    }
    [data-theme="dark"] { --muted: #9A9790; }
    #themeToggle {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      width: 32px; height: 32px; cursor: pointer; font-size: 14px;
      color: var(--muted); transition: background .15s, color .15s;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; line-height: 1;
    }
    #themeToggle:hover { background: var(--tag-bg); color: var(--text); }
    [data-theme="dark"] .topnav { background: rgba(17,17,16,0.92); }
    [data-theme="dark"] .topnav .nav-links { background: rgba(17,17,16,0.98) !important; }
    [data-theme="dark"] .btn-primary { color: var(--bg); }
    [data-theme="dark"] .date-hero { background: linear-gradient(135deg, #1B1A18 60%, #211E1A 100%) !important; }
    [data-theme="dark"] .quote-card { background: #1B1A18; }
    [data-theme="dark"] .quote-text { color: rgba(240,237,232,0.9); }
    [data-theme="dark"] .quote-mark { color: rgba(240,237,232,0.2); }
    [data-theme="dark"] .quote-author { color: rgba(240,237,232,0.45); }
    [data-theme="dark"] .astro-icon.sun { background: #2D1F0F; }
    [data-theme="dark"] .astro-icon.moon { background: #141B24; }
    [data-theme="dark"] #calPopup { box-shadow: 0 8px 32px rgba(0,0,0,.4); }
    [data-theme="dark"] .filter-btn:hover, [data-theme="dark"] .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
    [data-theme="dark"] .date-search input[type=date] { color-scheme: dark; }
    [data-theme="dark"] .calc-btn { color: var(--bg); }
    [data-theme="dark"] .type-panstwowe { background: #0D1526; color: #7BA0D4; }
    [data-theme="dark"] .type-koscielne { background: #1F1208; color: #D4955A; }
    [data-theme="dark"] .type-nieoficjalne { background: var(--tag-bg); color: var(--muted); }
    [data-theme="dark"] .type-miedzynarodowe { background: #0D1F10; color: #7BC87F; }
    [data-theme="dark"] input[type=date], [data-theme="dark"] input[type=text],
    [data-theme="dark"] input[type=number], [data-theme="dark"] select {
      background: var(--surface); color: var(--text); border-color: var(--border); color-scheme: dark;
    }
    [data-theme="dark"] .field input, [data-theme="dark"] .field select,
    [data-theme="dark"] .date-input, [data-theme="dark"] .calc-input {
      background: var(--surface); color: var(--text);
    }
    [data-theme="dark"] .month-tab { color: var(--muted); }
    [data-theme="dark"] .month-tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }
    [data-theme="dark"] .filter-btn { color: var(--muted); }
    [data-theme="dark"] a { color: inherit; }
    [data-theme="dark"] a:hover { color: var(--text); }
    /* Accessibility: font scaling */
    [data-font="large"] { font-size: 112%; }
    [data-font="xl"] { font-size: 125%; }
    /* Better line-height */
    body { line-height: 1.65; }
    /* Focus outline for keyboard navigation */
    :focus-visible { outline: 2px solid var(--sun, #E8936A); outline-offset: 2px; border-radius: 4px; }
    /* Font-size toggle button */
    #fontToggle {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      width: 32px; height: 32px; cursor: pointer; font-size: 11px; font-weight: 700;
      color: var(--muted); transition: background .15s, color .15s;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; line-height: 1; font-family: inherit; letter-spacing: -.03em;
    }
    #fontToggle:hover { background: var(--tag-bg); color: var(--text); }
  </style>
  <script>
    (function(){
      var s=localStorage.getItem('dbd-theme');
      var p=window.matchMedia('(prefers-color-scheme:dark)').matches;
      document.documentElement.setAttribute('data-theme',s||(p?'dark':'light'));
            var f=localStorage.getItem('dbd-font')||'normal';if(f!=='normal')document.documentElement.setAttribute('data-font',f);
    })();
  </script>
</head>
<body>
<nav class="topnav">
  <a href="index.html" class="nav-logo">DaybyDay</a>
  <ul class="nav-links">
    <li><a href="index.html">Główna</a></li>
    <li><a href="imieniny.html">Imieniny</a></li>
    <li><a href="swieta.html">Święta</a></li>
    <li><a href="kalkulatory.html">Kalkulatory</a></li>
  </ul>
    <button id="fontToggle" onclick="cycleFontSize()" title="Rozmiar tekstu" aria-label="Zmień rozmiar tekstu">A</button>
    <button id="themeToggle" onclick="toggleDarkMode()" title="Tryb ciemny/jasny" aria-label="Przełącz tryb ciemny/jasny"></button>
  <button class="nav-burger" id="navBurger" aria-label="Menu" onclick="var nl=document.querySelector('.topnav .nav-links');nl.classList.toggle('open');this.classList.toggle('open')"><span></span><span></span><span></span></button>
</nav>

<main>
  <div>
    <div class="err-num">404</div>
    <h1 class="err-title">Strona nie istnieje</h1>
    <p class="err-sub">Być może link jest nieaktualny albo strona została przeniesiona. Wróć na stronę główną i sprawdź co się dzieje dziś.</p>
    <div class="err-links">
      <a href="index.html" class="btn btn-primary">Strona główna</a>
      <a href="imieniny.html" class="btn btn-secondary">Imieniny</a>
      <a href="swieta.html" class="btn btn-secondary">Święta</a>
    </div>
  </div>
</main>

<footer>
  <span class="footer-logo">DaybyDay</span>
</footer>
<script>if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js");</script>
<script>
  function toggleDarkMode(){
    var d=document.documentElement;
    var t=d.getAttribute('data-theme')==='dark'?'light':'dark';
    d.setAttribute('data-theme',t);
    localStorage.setItem('dbd-theme',t);
    updateThemeBtn();
  }
  function updateThemeBtn(){
    var b=document.getElementById('themeToggle');
    if(b) b.setAttribute('aria-label', document.documentElement.getAttribute('data-theme')==='dark'?'Przełącz na tryb jasny':'Przełącz na tryb ciemny');
    if(b) b.textContent=document.documentElement.getAttribute('data-theme')==='dark'?'☀':'☾';
  }
  function cycleFontSize(){
    var sizes=['normal','large','xl'];
    var d=document.documentElement;
    var cur=d.getAttribute('data-font')||'normal';
    var next=sizes[(sizes.indexOf(cur)+1)%sizes.length];
    d.setAttribute('data-font',next);
    localStorage.setItem('dbd-font',next);
    updateFontBtn();
  }
  function updateFontBtn(){
    var b=document.getElementById('fontToggle');
    if(!b) return;
    var f=document.documentElement.getAttribute('data-font')||'normal';
    b.textContent=f==='normal'?'A':f==='large'?'A+':'A++';
    b.setAttribute('aria-label',f==='normal'?'Zwiększ czcionkę':f==='large'?'Jeszcze większa czcionka':'Przywróć domyślną czcionkę');
  }
  (function(){
    updateThemeBtn();
    updateFontBtn();
  })();
</script>

<script src="transitions.js"></script></body>
</html>
