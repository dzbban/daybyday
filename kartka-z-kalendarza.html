function getMoonPhase(date) {
  const known = new Date('2000-01-06T18:14:00Z');
  const diff = (date - known) / 86400000;
  const cycle = 29.53059;
  const age = ((diff % cycle) + cycle) % cycle;
  if (age < 1.5) return { phase:'Nów', symbol:'🌑', age:Math.round(age) };
  if (age < 7.38) return { phase:'Przybywający sierp', symbol:'🌒', age:Math.round(age) };
  if (age < 8.88) return { phase:'Pierwsza kwadra', symbol:'🌓', age:Math.round(age) };
  if (age < 14.77) return { phase:'Przybywający garb', symbol:'🌔', age:Math.round(age) };
  if (age < 16.27) return { phase:'Pełnia', symbol:'🌕', age:Math.round(age) };
  if (age < 22.15) return { phase:'Ubywający garb', symbol:'🌖', age:Math.round(age) };
  if (age < 23.65) return { phase:'Ostatnia kwadra', symbol:'🌗', age:Math.round(age) };
  return { phase:'Ubywający sierp', symbol:'🌘', age:Math.round(age) };
}

function getSunTimes(date) {
  const lat = 52.23, lon = 21.01;
  const JD = date.getTime() / 86400000 + 2440587.5;
  const n = JD - 2451545.0;
  const L = (280.46 + 0.9856474 * n) % 360;
  const g = (357.528 + 0.9856003 * n) % 360 * Math.PI / 180;
  const lambda = ((L + 1.915 * Math.sin(g) + 0.02 * Math.sin(2*g)) * Math.PI / 180);
  const eps = (23.439 - 0.0000004 * n) * Math.PI / 180;
  const sinDec = Math.sin(eps) * Math.sin(lambda);
  const dec = Math.asin(sinDec);
  const cosDec = Math.cos(dec);
  const cosLat = Math.cos(lat * Math.PI / 180);
  const sinLat = Math.sin(lat * Math.PI / 180);
  const cosH = (Math.cos(90.833 * Math.PI / 180) - sinLat * sinDec) / (cosLat * cosDec);
  if (cosH > 1 || cosH < -1) return null;
  const H = Math.acos(cosH) * 180 / Math.PI;
  const eot = (-7.655 * Math.sin(g) + 9.873 * Math.sin(2*lambda + 3.588) + 0.439 * Math.sin(4*lambda)) / 60;
  const noon = 12 - lon/15 - eot;
  const m = date.getMonth(), d = date.getDate();
  const isDST = (m > 2 && m < 9) || (m === 2 && d >= 29) || (m === 9 && d < 25);
  const offset = isDST ? 2 : 1;
  return { rise: noon - H/15 + offset, set: noon + H/15 + offset };
}

function fmtTime(h) {
  const hh = Math.floor(h) % 24;
  const mm = Math.round((h - Math.floor(h)) * 60);
  return String(hh).padStart(2,'0') + ':' + String(mm % 60).padStart(2,'0');
}

function dayOfYear(d) {
  return Math.round((d - new Date(d.getFullYear(), 0, 0)) / 86400000);
}

function weekOfYear(d) {
  const startOfYear = new Date(d.getFullYear(), 0, 1);
  return Math.ceil(((d - startOfYear) / 86400000 + startOfYear.getDay() + 1) / 7);
}

function renderDay(dateStr) {
  const date = new Date(dateStr + 'T12:00:00');
  const d = date.getDate(), m = date.getMonth() + 1, y = date.getFullYear();
  const wd = WEEKDAYS[date.getDay()];
  const doy = dayOfYear(date);
  const woy = weekOfYear(date);
  const daysLeft = (new Date(y, 11, 31) - date) / 86400000;
  const key = m + '-' + d;

  // Hero
  document.getElementById('heroDate').innerHTML = `
    <div>
      <div class="hero-day">${d}</div>
      <div class="hero-month">${MONTHS_GEN[m-1]} ${y}</div>
      <div class="hero-weekday">${wd.charAt(0).toUpperCase() + wd.slice(1)}</div>
    </div>
    <div class="hero-meta">
      <div class="meta-item">Dzień roku<br><span class="meta-val">${doy}</span></div>
      <div class="meta-item">Tydzień<br><span class="meta-val">${woy}</span></div>
      <div class="meta-item">Dni do końca roku<br><span class="meta-val">${Math.round(daysLeft)}</span></div>
    </div>
  `;

  // Imieniny
  const names = NAMES_DB[key] || NAMES_DB[m + '-' + d] || [];
  const namesHTML = names.length
    ? names.map(n => `<a href="imieniny.html?name=${encodeURIComponent(n)}" class="name-badge">${n}</a>`).join('')
    : '<span style="color:var(--muted);font-size:.82rem">Brak danych dla tego dnia</span>';

  // Słońce
  const sun = getSunTimes(date);
  const sunHTML = sun
    ? `<div class="sun-row">
        <div class="sun-item"><div class="sun-time">☀️ ${fmtTime(sun.rise)}</div><div class="sun-lbl">Wschód słońca</div></div>
        <div class="sun-item"><div class="sun-time">🌅 ${fmtTime(sun.set)}</div><div class="sun-lbl">Zachód słońca</div></div>
        <div class="sun-item"><div class="sun-time">⏱ ${Math.floor(sun.set-sun.rise)}h ${Math.round(((sun.set-sun.rise)%1)*60)}m</div><div class="sun-lbl">Długość dnia</div></div>
      </div>` : 'Brak danych';

  // Księżyc
  const moon = getMoonPhase(date);
  const moonHTML = `<div class="moon-row"><div class="moon-symbol">${moon.symbol}</div><div class="moon-info"><div class="moon-phase">${moon.phase}</div><div class="moon-age">${moon.age}. dzień cyklu</div></div></div>`;

  // Święta
  const hols = HOLIDAYS_DB[key] || [];
  const holsHTML = hols.length
    ? `<div class="holiday-list">${hols.map(h => `<div class="holiday-item"><div class="holiday-icon">🎉</div><div>${h}</div></div>`).join('')}</div>`
    : '<span style="color:var(--muted);font-size:.82rem">Brak świąt tego dnia</span>';

  document.getElementById('infoGrid').innerHTML = `
    <div class="info-card">
      <div class="ic-label">🎂 Imieniny</div>
      <div class="names-row">${namesHTML}</div>
    </div>
    <div class="info-card">
      <div class="ic-label">☀️ Słońce — Warszawa</div>
      ${sunHTML}
    </div>
    <div class="info-card">
      <div class="ic-label">🌙 Faza Księżyca</div>
      ${moonHTML}
    </div>
    <div class="info-card">
      <div class="ic-label">🎊 Święta i wydarzenia</div>
      ${holsHTML}
    </div>
  `;

  // Przysłowie
  const provs = PROVERBS_DB[key] || [];
  if (provs.length) {
    document.getElementById('proverbCard').innerHTML = `
      <div class="proverb-card">
        <div class="proverb-label">🌾 Przysłowie na dziś</div>
        <div class="proverb-text">${provs[0]}</div>
        ${provs[1] ? `<div class="proverb-text" style="margin-top:.75rem;font-size:.95rem;color:var(--muted)">${provs[1]}</div>` : ''}
      </div>
    `;
  } else {
    document.getElementById('proverbCard').innerHTML = '';
  }

  // Update nav buttons
  const prev = new Date(date); prev.setDate(prev.getDate() - 1);
  const next = new Date(date); next.setDate(next.getDate() + 1);
  document.getElementById('prevBtn').onclick = () => navigate(prev.toISOString().slice(0,10));
  document.getElementById('nextBtn').onclick = () => navigate(next.toISOString().slice(0,10));
}

function navigate(dateStr) {
  document.getElementById('datePicker').value = dateStr;
  renderDay(dateStr);
}

function goToday() {
  const today = new Date().toISOString().slice(0,10);
  navigate(today);
}

document.getElementById('datePicker').addEventListener('change', function() {
  renderDay(this.value);
});

// Sprawdź URL param
const urlDate = new URLSearchParams(window.location.search).get('date');
if (urlDate) {
  document.getElementById('datePicker').value = urlDate;
  renderDay(urlDate);
} else {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('datePicker').value = today;
  renderDay(today);
}
</script>

<script>
  function toggleDarkMode(){
    var d=document.documentElement;
    var t=d.getAttribute('data-theme')==='dark'?'light':'dark';
    d.setAttribute('data-theme',t);
    localStorage.setItem('dbd-theme',t);
    updateThemeBtn();
  }
  function updateThemeBtn(){
    var b=document.getElementById('themeToggle');
    if(b) b.setAttribute('aria-label', document.documentElement.getAttribute('data-theme')==='dark'?'Przełącz na tryb jasny':'Przełącz na tryb ciemny');
    if(b) b.textContent=document.documentElement.getAttribute('data-theme')==='dark'?'☀':'☾';
  }
  function cycleFontSize(){
    var sizes=['normal','large','xl'];
    var d=document.documentElement;
    var cur=d.getAttribute('data-font')||'normal';
    var next=sizes[(sizes.indexOf(cur)+1)%sizes.length];
    d.setAttribute('data-font',next);
    localStorage.setItem('dbd-font',next);
    updateFontBtn();
  }
  function updateFontBtn(){
    var b=document.getElementById('fontToggle');
    if(!b) return;
    var f=document.documentElement.getAttribute('data-font')||'normal';
    b.textContent=f==='normal'?'A':f==='large'?'A+':'A++';
    b.setAttribute('aria-label',f==='normal'?'Zwiększ czcionkę':f==='large'?'Jeszcze większa czcionka':'Przywróć domyślną czcionkę');
  }
  (function(){
    updateThemeBtn();
    updateFontBtn();
  })();
</script>
