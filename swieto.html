function getBadgeClass(type) {
  return { state:'badge-state', religious:'badge-religious', cultural:'badge-cultural', unofficial:'badge-unofficial' }[type] || 'badge-unofficial';
}

function render() {
  const id = new URLSearchParams(window.location.search).get('id');
  const page = document.getElementById('pageContent');

  if (!id || !HOLIDAYS_DB[id]) {
    page.innerHTML = `
      <div class="not-found">
        <div style="font-size:3rem;margin-bottom:1rem">🗓️</div>
        <div class="not-found-title">Nie znaleziono święta</div>
        <div class="not-found-sub">Spróbuj wrócić do <a href="swieta.html" style="color:var(--text)">listy świąt</a>.</div>
      </div>`;
    return;
  }

  const h = HOLIDAYS_DB[id];
  document.title = `${h.name} — DaybyDay`;

  const tradItems = h.traditions.map(t => `<li><span class="trad-dot"></span><span>${t}</span></li>`).join('');
  const relLinks = (h.related || []).map(slug => {
    const rel = HOLIDAYS_DB[slug];
    return rel ? `<a href="swieto.html?id=${slug}" class="related-link">${rel.emoji} ${rel.name}</a>` : '';
  }).join('');

  page.innerHTML = `
    <div class="breadcrumb">
      <a href="index.html">DaybyDay</a>
      <span class="breadcrumb-sep">›</span>
      <a href="swieta.html">Święta</a>
      <span class="breadcrumb-sep">›</span>
      <span>${h.name}</span>
    </div>

    <div class="holiday-header">
      <div class="holiday-emoji">${h.emoji}</div>
      <div class="holiday-badges">
        <span class="badge ${getBadgeClass(h.type)}">${h.typeLabel}</span>
        ${h.type2 ? `<span class="badge ${getBadgeClass(h.type2)}">${h.typeLabel2}</span>` : ''}
        ${h.dayOff ? '<span class="badge badge-dayoff">Dzień wolny</span>' : ''}
      </div>
      <h1 class="holiday-title">${h.name}</h1>
      <div class="holiday-date">${h.date}</div>
    </div>

    <div class="info-grid">
      <div class="info-card">
        <div class="info-label">Pochodzenie</div>
        <div class="info-value">${h.origin}</div>
      </div>
      <div class="info-card">
        <div class="info-label">Obchodzone w</div>
        <div class="info-value">${h.observed}</div>
      </div>
    </div>

    <div class="holiday-body">
      ${h.desc.map(p => `<p>${p}</p>`).join('')}
    </div>

    <div class="section">
      <div class="section-title">Tradycje i zwyczaje</div>
      <ul class="traditions-list">${tradItems}</ul>
    </div>

    ${relLinks ? `<div class="related-section">
      <div class="related-title">Powiązane święta</div>
      <div class="related-links">${relLinks}</div>
    </div>` : ''}
  `;
}

render();
</script>

<script>
  function toggleDarkMode(){
    var d=document.documentElement;
    var t=d.getAttribute('data-theme')==='dark'?'light':'dark';
    d.setAttribute('data-theme',t);
    localStorage.setItem('dbd-theme',t);
    updateThemeBtn();
  }
  function updateThemeBtn(){
    var b=document.getElementById('themeToggle');
    if(b) b.setAttribute('aria-label', document.documentElement.getAttribute('data-theme')==='dark'?'Przełącz na tryb jasny':'Przełącz na tryb ciemny');
    if(b) b.textContent=document.documentElement.getAttribute('data-theme')==='dark'?'☀':'☾';
  }
  function cycleFontSize(){
    var sizes=['normal','large','xl'];
    var d=document.documentElement;
    var cur=d.getAttribute('data-font')||'normal';
    var next=sizes[(sizes.indexOf(cur)+1)%sizes.length];
    d.setAttribute('data-font',next);
    localStorage.setItem('dbd-font',next);
    updateFontBtn();
  }
  function updateFontBtn(){
    var b=document.getElementById('fontToggle');
    if(!b) return;
    var f=document.documentElement.getAttribute('data-font')||'normal';
    b.textContent=f==='normal'?'A':f==='large'?'A+':'A++';
    b.setAttribute('aria-label',f==='normal'?'Zwiększ czcionkę':f==='large'?'Jeszcze większa czcionka':'Przywróć domyślną czcionkę');
  }
  (function(){
    updateThemeBtn();
    updateFontBtn();
  })();
</script>
