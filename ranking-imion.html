:root{--bg:#F8F7F5;--text:#1A1916;--muted:#7A776E;--card:#FFFFFF;--border:#E8E5DF;--tag-bg:#F0EDE8;--medal1:#C9A84C;--medal2:#9E9E9E;--medal3:#A0714F}

*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;animation:pageIn .28s ease both}
@keyframes pageIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
body.page-out{animation:pageOut .22s ease forwards}
@keyframes pageOut{to{opacity:0;transform:translateY(-5px)}}

.nav-links{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
.nav-links a{font-size:.8rem;color:var(--muted);text-decoration:none;padding:.35rem .75rem;border-radius:60px;transition:background .15s}

.hero-sub{font-size:.9rem;color:var(--muted);line-height:1.6}

.filters{max-width:900px;margin:0 auto;padding:.75rem 1.25rem 1.25rem;display:flex;flex-wrap:wrap;gap:.5rem;align-items:center}
.filter-btn{background:var(--tag-bg);border:1px solid var(--border);border-radius:60px;padding:.4rem 1rem;font-size:.82rem;cursor:pointer;color:var(--text);font-family:inherit;transition:all .15s}
.filter-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
select{background:var(--tag-bg);border:1px solid var(--border);border-radius:60px;padding:.4rem 1.1rem .4rem .9rem;font-size:.82rem;color:var(--text);font-family:inherit;cursor:pointer}

.ranking-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}

.ranking-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.rcard-head{padding:.9rem 1.2rem .7rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem}
.rcard-head h2{font-size:.95rem;font-weight:700}
.pill{font-size:.7rem;background:var(--tag-bg);border-radius:60px;padding:.2rem .6rem;color:var(--muted)}
.rlist{list-style:none}
.ritem{display:flex;align-items:center;gap:.7rem;padding:.6rem 1.2rem;border-bottom:1px solid var(--border);transition:background .12s}
.ritem:last-child{border-bottom:none}
.ritem:hover{background:var(--tag-bg)}
.rnum{font-size:.75rem;font-weight:700;width:1.4rem;text-align:right;color:var(--muted);flex-shrink:0}
.rnum.g{color:#C9A84C}.rnum.s{color:#9E9E9E}.rnum.b{color:#A0714F}
.rname{flex:1;font-size:.93rem;font-weight:500}
.rbar-w{width:50px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;flex-shrink:0}
.rbar{height:100%;background:var(--muted);border-radius:2px}
.rcnt{font-size:.75rem;color:var(--muted);white-space:nowrap;min-width:2.5rem;text-align:right}
footer{border-top:1px solid var(--border);padding:1.5rem 1.25rem;text-align:center;font-size:.78rem;color:var(--muted)}
footer a{color:var(--muted);text-decoration:none}
footer a:hover{color:var(--text)}

let plec='f';
function setPlec(p){
  plec=p;
  document.getElementById('btnF').classList.toggle('active',p==='f');
  document.getElementById('btnM').classList.toggle('active',p==='m');
  render();
}
function medal(i){return i===0?'g':i===1?'s':i===2?'b':'';}
function card(title, pill, list, offset, max){
  if(!list.length) return '';
  return '<div class="ranking-card"><div class="rcard-head"><h2>'+title+'</h2><span class="pill">'+pill+'</span></div><ul class="rlist">'
    +list.map(function(e,i){
      var name=e[0],cnt=e[1],bar=Math.round(cnt/max*100);
      return '<li class="ritem"><span class="rnum '+medal(i+offset)+'">'+( i+offset+1)+'</span>'
        +'<span class="rname">'+name+'</span>'
        +'<div class="rbar-w"><div class="rbar" style="width:'+bar+'%"></div></div>'
        +'<span class="rcnt">'+cnt.toLocaleString('pl-PL')+'</span></li>';
    }).join('')+'</ul></div>';
}
function render(){
  var woj=document.getElementById('wojSel').value;
  var key=(woj in DATA[plec])?woj:'Polska';
  var list=DATA[plec][key]||[];
  var max=list[0]?list[0][1]:1;
  var top20=list.slice(0,20);
  var rest=list.slice(20,50);
  document.getElementById('grid').innerHTML=
    card('TOP 20',woj,top20,0,max)+
    (rest.length?card('Miejsca 21–50',woj,rest,20,max):'');
}
function toggleDark(){
  var d=document.documentElement,dark=d.getAttribute('data-theme')==='dark';
  d.setAttribute('data-theme',dark?'light':'dark');
  localStorage.setItem('dbd-theme',dark?'light':'dark');
  document.getElementById('themeBtn').textContent=dark?'\ud83c\udf19':'\u2600\ufe0f';
}
(function(){
  var t=localStorage.getItem('dbd-theme')||'light';
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('themeBtn').textContent=t==='dark'?'\u2600\ufe0f':'\ud83c\udf19';
})();
render();
</script>
